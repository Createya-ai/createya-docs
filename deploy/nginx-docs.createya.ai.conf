# /etc/nginx/sites-available/docs.createya.ai
#
# Применять на PROD VM (158.160.200.216):
#   1. sudo cp deploy/nginx-docs.createya.ai.conf /etc/nginx/sites-available/docs.createya.ai
#   2. sudo ln -s /etc/nginx/sites-available/docs.createya.ai /etc/nginx/sites-enabled/
#   3. sudo mkdir -p /var/www/docs.createya.ai
#   4. sudo certbot --nginx -d docs.createya.ai --non-interactive --agree-tos -m support@createya.ai
#   5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name docs.createya.ai;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # HTTPS redirect
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name docs.createya.ai;

    ssl_certificate /etc/letsencrypt/live/docs.createya.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.createya.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/docs.createya.ai;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Aggressive cache for hashed assets (Astro generates content-hashed filenames)
    location ~* \.(js|css|woff2?|svg|jpg|jpeg|png|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML — short cache, revalidate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # SPA-style fallback for clean URLs
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Robots, sitemap, llms.txt
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sitemap-index.xml {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /llms.txt {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "text/plain; charset=utf-8";
        try_files $uri =404;
    }

    access_log /var/log/nginx/docs.createya.ai.access.log;
    error_log /var/log/nginx/docs.createya.ai.error.log warn;
}
