name: Build & deploy docs.createya.ai

# Триггеры:
#   - Push в main → деплой
#   - Cron каждый понедельник 09:00 UTC → пересобирает каталог моделей и деплоит
#   - workflow_dispatch → ручной запуск (например после изменения цен)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Зачем триггерим'
        required: false
        default: 'manual rebuild'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: deploy-docs
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync models from /v1/models
        env:
          CREATEYA_API_KEY: ${{ secrets.CREATEYA_API_KEY }}
        run: npm run sync:models || echo "Sync skipped (api closed)"
        continue-on-error: true

      - name: Commit updated model pages (if changed)
        run: |
          git config user.name "createya-docs-bot"
          git config user.email "support@createya.ai"
          if git diff --quiet models/; then
            echo "No model changes."
          else
            git add models/
            git commit -m "chore(sync): обновлён каталог моделей $(date +%Y-%m-%d)"
            git push origin HEAD
          fi
        continue-on-error: true

      - name: Build VitePress site
        run: npm run build

      - name: Setup SSH for rsync
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_PROD_VM }}

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 158.160.200.216 >> ~/.ssh/known_hosts

      - name: Rsync built site to PROD VM
        run: |
          rsync -avz --delete \
            ./.vitepress/dist/ \
            createya@158.160.200.216:/var/www/docs.createya.ai/

      - name: Verify deploy
        run: |
          sleep 2
          curl -sI https://docs.createya.ai/ | head -3
          echo "✓ Deploy complete: https://docs.createya.ai/"
